<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTube — Study Dashboard</title>
  <meta name="description" content="Track your study sessions, focus score, and weekly progress with FocusTube.">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="dashboard" id="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar__logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <defs>
            <linearGradient id="dash-grad" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#6C3CE1"/>
              <stop offset="100%" stop-color="#00B4D8"/>
            </linearGradient>
          </defs>
          <rect rx="7" width="32" height="32" fill="url(#dash-grad)"/>
          <polygon points="13,10 13,22 23,16" fill="white"/>
        </svg>
        <span>FocusTube</span>
      </div>

      <nav class="sidebar__nav">
        <button class="sidebar__nav-item sidebar__nav-item--active" data-tab="overview">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          Overview
        </button>
        <button class="sidebar__nav-item" data-tab="history">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 00-9 9H1l3.9 3.9.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.94 8.94 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
          History
        </button>
      </nav>

      <div class="sidebar__footer">
        <button class="sidebar__footer-btn" id="settings-link">⚙️ Settings</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <!-- Overview Tab -->
      <section class="tab" id="tab-overview">

        <header class="main__header">
          <div>
            <h1 class="main__title">Study Dashboard</h1>
            <p class="main__subtitle" id="today-date"></p>
          </div>
          <div class="main__header-badge" id="session-badge-area"></div>
        </header>

        <!-- Today's Stats -->
        <div class="stats-grid">
          <div class="stat-card stat-card--study">
            <div class="stat-card__icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            </div>
            <div class="stat-card__content">
              <span class="stat-card__value" id="stat-study-time">0m</span>
              <span class="stat-card__label">Study Time</span>
            </div>
          </div>

          <div class="stat-card stat-card--focus">
            <div class="stat-card__icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <div class="stat-card__content">
              <span class="stat-card__value" id="stat-focus-score">—</span>
              <span class="stat-card__label">Focus Score</span>
            </div>
          </div>

          <div class="stat-card stat-card--distractions">
            <div class="stat-card__icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
            </div>
            <div class="stat-card__content">
              <span class="stat-card__value" id="stat-distractions">0</span>
              <span class="stat-card__label">Distractions</span>
            </div>
          </div>

          <div class="stat-card stat-card--recovered">
            <div class="stat-card__icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 6V2L7 7l5 5V8c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
            </div>
            <div class="stat-card__content">
              <span class="stat-card__value" id="stat-recovered">0</span>
              <span class="stat-card__label">Recovered</span>
            </div>
          </div>
        </div>

        <!-- Weekly Chart -->
        <div class="chart-card">
          <div class="chart-card__header">
            <h2 class="chart-card__title">Weekly Study Activity</h2>
            <div class="chart-card__legend">
              <span class="chart-card__legend-item">
                <span class="chart-card__legend-dot" style="background: #8B5CF6"></span>
                Study
              </span>
              <span class="chart-card__legend-item">
                <span class="chart-card__legend-dot" style="background: #F59E0B"></span>
                Break
              </span>
            </div>
          </div>
          <div class="chart-card__body">
            <canvas id="weekly-chart" width="700" height="240"></canvas>
          </div>
        </div>

        <!-- Distractions Chart -->
        <div class="chart-card">
          <div class="chart-card__header">
            <h2 class="chart-card__title">Distractions This Week</h2>
          </div>
          <div class="chart-card__body">
            <canvas id="distractions-chart" width="700" height="180"></canvas>
          </div>
        </div>

        <!-- Goals Summary -->
        <div class="goals-card">
          <h2 class="goals-card__title">Goals</h2>
          <div class="goals-card__stats">
            <div class="goals-card__stat">
              <span class="goals-card__stat-value" id="goals-completed">0</span>
              <span class="goals-card__stat-label">Completed</span>
            </div>
            <div class="goals-card__stat">
              <span class="goals-card__stat-value" id="goals-sessions">0</span>
              <span class="goals-card__stat-label">Sessions</span>
            </div>
            <div class="goals-card__stat">
              <span class="goals-card__stat-value" id="goals-rate">—</span>
              <span class="goals-card__stat-label">Completion Rate</span>
            </div>
          </div>
        </div>

      </section>

      <!-- History Tab -->
      <section class="tab tab--hidden" id="tab-history">
        <header class="main__header">
          <h1 class="main__title">Session History</h1>
        </header>
        <div class="history-list" id="history-list">
          <p class="history__empty">No sessions recorded yet.</p>
        </div>
      </section>

    </main>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
